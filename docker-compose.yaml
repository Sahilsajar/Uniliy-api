version: '3.8'

services:

  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command: [
      "-path=/migrations",
      "-database=${DATABASE_URL}",
      "up"
    ]
    restart: on-failure